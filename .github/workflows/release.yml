name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        run: pip install build && python -m build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
